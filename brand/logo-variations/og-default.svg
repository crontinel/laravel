<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#fff" stroke-width="1" fill="none">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- Left side: clock icon -->
  <g transform="translate(120, 315)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="110" fill="none" stroke="#6366f1" stroke-width="8" opacity="0.3"/>
    <circle cx="0" cy="0" r="90" fill="#6366f1" opacity="0.15"/>
    <circle cx="0" cy="0" r="90" fill="none" stroke="#6366f1" stroke-width="6"/>

    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-55" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="40" y2="20" stroke="#fff" stroke-width="6" stroke-linecap="round"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="8" fill="#fff"/>

    <!-- Status dot -->
    <circle cx="70" cy="-70" r="18" fill="#22c55e" filter="url(#glow)"/>
    <circle cx="70" cy="-70" r="10" fill="#4ade80"/>
  </g>

  <!-- Main text -->
  <g transform="translate(380, 260)">
    <!-- CRONTINEL -->
    <text x="0" y="0" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="120" font-weight="800" fill="#ffffff" letter-spacing="-3">
      CRONTINEL
    </text>

    <!-- Divider line -->
    <rect x="0" y="30" width="680" height="4" rx="2" fill="url(#accent)"/>

    <!-- Tagline -->
    <text x="0" y="100" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
          font-size="44" font-weight="400" fill="#94a3b8" letter-spacing="0">
      Cron, Scheduler &amp; Background Job Monitoring
    </text>
  </g>

  <!-- Bottom right: subtle status dots -->
  <g transform="translate(1100, 580)" opacity="0.6">
    <circle cx="0" cy="0" r="8" fill="#22c55e"/>
    <circle cx="24" cy="0" r="8" fill="#6366f1"/>
    <circle cx="48" cy="0" r="8" fill="#6366f1" opacity="0.5"/>
  </g>

  <!-- Top right: subtle accent -->
  <g transform="translate(1050, 50)" opacity="0.08">
    <circle cx="0" cy="0" r="100" fill="#6366f1"/>
  </g>
</svg>
